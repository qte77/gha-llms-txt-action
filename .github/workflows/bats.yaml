name: BATS

on:
  push:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install BATS
        # FIXME: sudo required due to EACCES on /usr/local/share/man — use bats-core/bats-core action or apt instead
        run: sudo npm install -g bats

      - name: Run BATS tests
        run: bats tests/unit/
